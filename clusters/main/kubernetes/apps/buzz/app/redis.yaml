---
# Standalone Redis for buzz.
#
# app-template 15.38.8 has no redis subchart (its only dependency is `common`),
# so `redis.enabled: true` in the HelmRelease is a no-op flag. The chart also
# validates env secretKeyRefs against chart-managed secrets only, so buzz's
# REDIS_URL must be a literal pointing here rather than a secret reference.
#
# Contents are disposable: pub/sub fan-out and the shared admission rate-limit
# counters. Persistence is disabled deliberately — nothing here survives a
# restart and nothing needs to.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: buzz-redis
  namespace: buzz
  labels:
    app.kubernetes.io/name: buzz-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: buzz-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: buzz-redis
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: docker.io/redis:7.4-alpine
          args:
            - redis-server
            - --save
            - ""
            - --appendonly
            - "no"
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru
          ports:
            - name: redis
              containerPort: 6379
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 320Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: buzz-redis
  namespace: buzz
  labels:
    app.kubernetes.io/name: buzz-redis
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: buzz-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
