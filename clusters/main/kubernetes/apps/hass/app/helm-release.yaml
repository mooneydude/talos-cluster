apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hass
  namespace: hass
spec:
  interval: 15m
  chart:
    spec:
      chart: home-assistant
      version: 30.10.1
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  driftDetection:
    mode: warn
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    # image:
    #   repository: docker.io/homeassistant/home-assistant
    #   pullPolicy: IfNotPresent
    #   tag: 2025.12.5@sha256:9a5a3eb4a213dfb25932dee9dc6815c9305f78cecb5afa716fa2483163d8fb5b
    matterServerImage:
      repository: ghcr.io/home-assistant-libs/python-matter-server
      pullPolicy: IfNotPresent
      tag: stable
    ## Enable host networking for direct network access. True breaks K8s security.
    # hostNetwork: true
    TZ: America/Chicago 
    resources:
      requests:
        cpu: 10m      
    global:
      stopAll: false 
    credentials:
      s3:
        type: s3
        url: "${MINIO_S3URL}"
        bucket: "${MINIO_S3PREFIX}-hass-rwx"
        accessKey: "${MINIO_S3ID}"
        secretKey: "${MINIO_S3KEY}"
        encrKey: "${MINIO_S3KEY}"
    service:
      main:
        enabled: true
        loadBalancerIP: ${HASS_IP}
        type: LoadBalancer
        integrations:
          metallb:
            enabled: true
        ports:
          main:
            enabled: true
            port: 8123
            protocol: tcp
            targetPort: 8123
    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: ha.${DOMAIN_1}
        integrations:
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod  
    homeassistant:
      trusted_proxies:
      - 172.16.0.0/16
      - 172.17.0.0/16
      - 192.168.2.0/24
    persistence:
      config:
        storageClass: ceph-filesystem
        size: 1Gi
        accessModes:
          - ReadWriteMany        
        volsync:
          - name: b2
            type: restic
            credentials: s3
            dest:
              volumeSnapshotClassName: ceph-filesystem
              enabled: true
            src:
              volumeSnapshotClassName: ceph-filesystem 
              enabled: true
              trigger:
                schedule: "30 14 * * *"
      matter:
        enabled: true
        targetSelector:
          main:
            matter:
              mountPath: /data
        volsync:
          - credentials: s3
            dest:
              enabled: true
            name: matter
            src:
              enabled: true
              trigger:
                schedule: 45 0 * * *
            type: restic                
    cnpg:
      main:
        mode: recovery # Set to 'recovery' when recovery from S3, also change the revisions
        backups:
          enabled: true
          credentials: s3
          retentionPolicy: "14d"
          revision: "2"
        recovery:
          credentials: s3
          revision: "1"  

    #   zigbeedongle:
    #     enabled: true
    #     type: device
    #     hostPath: /dev/serial/by-id/usb-Silicon_Labs_CP2102N_USB_to_UART_Bridge_Controller_0001-if00-port0              

    # workload:
    #   main:
    #     # type: Deployment
    #     # strategy: RollingUpdate #ToDo install a second zigbee dongle 
    #     # replicas: 2      
    #     podSpec:
    #       nodeSelector:
    #         feature.node.kubernetes.io/usb-ff_10c4_ea60.present: "true"
            
         
    workload:
      main:
        podSpec:
          # nodeSelector:
          #   zigbee: "true"
          hostNetwork: true
          containers:
            matter:
              enabled: true
              imageSelector: matterServerImage
              # matter-server needs --primary-interface for mDNS, but the host NIC name
              # differs per node (eno1 on worker-1/2, ens18 on worker-3) and this pod is
              # not node-pinned. Detect the default-route interface at startup so matter
              # works on whichever node it lands on, with no nodeSelector.
              # NOTE: $$ escapes Flux postBuild var substitution (renders to a literal $).
              # Background mdns-proxy: Avahi on pfSense does not reflect _matter._tcp from
              # the IoT VLAN with a routable address, so matter-server can't discover the
              # fish tank outlet (node 30) operationally. Publish a fake _matter._tcp record
              # pointing at the device's static IPv4 so CASE sessions establish cross-VLAN.
              # Update FABRIC/NODE if the fabric is ever reset or the device recommissioned.
              command:
                - /bin/sh
                - -c
                - |
                  IFACE="$$(ip -o -4 route show default | head -n1 | sed -n 's/.* dev \([^ ]*\).*/\1/p')"
                  echo "matter-server: auto-detected primary interface: $${IFACE:-NONE}"
                  python3 -c "
                  import socket, time
                  from zeroconf import Zeroconf, ServiceInfo
                  svc = '9A2EAF8669398CC6-000000000000001E._matter._tcp.local.'
                  ip  = '192.168.68.110'
                  while True:
                   try:
                    zc = Zeroconf()
                    zc.register_service(ServiceInfo('_matter._tcp.local.', svc, addresses=[socket.inet_aton(ip)], port=5540, properties={b'SII': b'5000', b'SAI': b'300'}, server='fish-tank-matter.local.'))
                    print('[mdns-proxy] registered ' + svc, flush=True)
                    while True: time.sleep(3600)
                   except Exception as e:
                    print('[mdns-proxy] restarting:', e, flush=True)
                    try: zc.close()
                    except: pass
                    time.sleep(10)
                  " &
                  exec matter-server \
                    --storage-path /data \
                    --paa-root-cert-dir /data/credentials \
                    --primary-interface "$${IFACE}"
              securityContext:
                readOnlyRootFilesystem: false
              probes:
                readiness:
                  enabled: true
                  type: http
                  port: 5580
                  path: /
                liveness:
                  enabled: true
                  type: http
                  port: 5580
                  path: /
                startup:
                  enabled: true
                  type: http
                  port: 5580
                  path: /