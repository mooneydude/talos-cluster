---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: jitsi-meet
  namespace: jitsi-meet
spec:
  interval: 15m
  chart:
    spec:
      chart: jitsi-meet
      version: 2.16.0
      sourceRef:
        kind: HelmRepository
        name: jitsi-contrib
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false

  # NOTE: key names below follow the jitsi-contrib/jitsi-helm values.yaml schema,
  # not truecharts/app-template. Verify against:
  # https://github.com/jitsi-contrib/jitsi-helm/blob/main/values.yaml
  values:
    publicURL: https://talk.${DOMAIN_1}
    tz: America/Chicago
    enableAuth: true
    enableGuests: true

    web:
      replicaCount: 1
      ingress:
        enabled: true
        ingressClassName: external
        annotations:
          cert-manager.io/cluster-issuer: domain-0-le-prod
          nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
          nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
          nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
        hosts:
          - host: talk.${DOMAIN_1}
            paths:
              - /
        tls:
          - secretName: jitsi-meet-web-tls
            hosts:
              - talk.${DOMAIN_1}

    prosody:
      replicaCount: 1
      # User accounts are stored in prosody's data dir; persist so moderators
      # survive pod restarts. Register users via `prosodyctl register`.
      persistence:
        enabled: true
        size: 3G
        storageClassName: ceph-filesystem

    jicofo:
      replicaCount: 1

    # JVB handles media (UDP/10000). Must stay at replicaCount: 1 unless
    # OCTO relay is enabled. MetalLB pins the LB IP via annotation.
    # publicIPs are advertised as ICE candidates; clients pick the reachable one.
    jvb:
      replicaCount: 1
      publicIPs:
        - ${WAN_IP}
        - ${JITSI_IP}
      service:
        type: LoadBalancer
        annotations:
          metallb.universe.tf/loadBalancerIPs: ${JITSI_IP}
