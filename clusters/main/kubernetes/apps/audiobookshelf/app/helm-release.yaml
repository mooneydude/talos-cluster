---
# yaml-language-server: schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: audiobookshelf
  namespace: audiobookshelf
spec:
  interval: 15m
  chart:
    spec:
      chart: audiobookshelf
      version: 12.25.0
      sourceRef:
        kind: HelmRepository
        name: truecharts
        namespace: flux-system
      interval: 15m
  timeout: 20m
  maxHistory: 3
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    global:
      stopAll: false
    TZ: America/Chicago
    credentials:
      s3:
        type: s3
        url: "${MINIO_S3URL}"
        bucket: "${MINIO_S3PREFIX}-audiobookshelf"
        accessKey: "${MINIO_S3ID}"
        secretKey: "${MINIO_S3KEY}"
        encrKey: "${MINIO_S3KEY}"       
    ingress:
      main:
        enabled: true
        ingressClassName: external
        hosts:
          - host: audiobooks.${DOMAIN_1}
        integrations:
          certManager:
            enabled: true
            certificateIssuer: domain-0-le-prod            
    persistence:
      config:
        storageClass: ceph-filesystem
        size: 1Gi
        accessModes:
          - ReadWriteMany        
        volsync:
          - name: onfi
            type: restic
            credentials: s3
            dest:
              enabled: false
            src:
              volumeSnapshotClassName: ceph-filesystem
              enabled: true
            trigger:
              schedule: "0 1 * * *"
      metadata:
        storageClass: ceph-filesystem
        size: 50Gi
        accessModes:
          - ReadWriteMany
        volsync:
          - name: metadata
            type: restic
            credentials: s3
            dest:
              enabled: false
            src:
              volumeSnapshotClassName: ceph-filesystem
              enabled: true
            trigger:
              schedule: "0 1 * * *"
      audiobooks:
        type: nfs
        server: ${TRUENAS_IP}
        path: "/mnt/bigdata/plex/Audio Books"
    securityContext:
      container:
        runAsUser: 3000
        runAsGroup: 3000
    workload:
      main:
        podSpec:
          securityContext:
            fsGroup: 3000